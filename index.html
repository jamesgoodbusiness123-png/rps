<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Site - Joy Tree Host</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .emoji {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .success {
            background: #22c55e;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .info {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: left;
        }
        
        .info h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .info p {
            font-size: 1rem;
            margin-bottom: 8px;
        }
        
        code {
            background: #1f2937;
            color: #22c55e;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🎉</div>
        <h1>Success!</h1>
        <p>Your website is running on Pterodactyl!</p>
        <div class="success">✅ Deployment Successful</div>
        
        <div class="info">
            <h3>📋 Server Information</h3>
            <p><strong>Status:</strong> Online</p>
            <p><strong>Framework:</strong> Node.js + Express</p>
            <p><strong>Port:</strong> <code id="port">Loading...</code></p>
        </div>
    </div>
    
    <script>
        // Fetch server info
        fetch('/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('port').textContent = data.port;
            })
            .catch(() => {
                document.getElementById('port').textContent = 'N/A';
            });
    </script>
</body>
</html>
