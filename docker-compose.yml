services:
  logiflow:
    build: .
    container_name: logiflow-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LOGIFLOW_DOCKER_NETWORK: logiflow_net
      WATCHDOG_INTERVAL_MS: 15000
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    networks:
      - logiflow_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: logiflow-nginx
    restart: unless-stopped
    depends_on:
      logiflow:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - logiflow_net

networks:
  logiflow_net:
    name: logiflow_net
    driver: bridge
